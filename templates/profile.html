<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="topbar">
      <div class="brand">Complaint Management</div>
      <div class="top-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/logout" class="logout-link">Logout</a>
      </div>
    </div>

    <div class="page narrow">
      <div class="panel form-panel">
        <div class="panel-head">
          <h2>Profile</h2>
        </div>

        <div class="profile-box">
          {% if session.user.image %}
          <img
            src="{{ url_for('static', filename='uploads/' + session.user.image) }}"
            class="avatar"
          />
          {% else %}
          <div class="avatar avatar-placeholder">
            {{ session.user.name[0] }}
          </div>
          {% endif %}
        </div>

        <form method="POST" enctype="multipart/form-data">
          <div class="form-group">
            <label>Name</label>
            <input name="name" value="{{ session.user.name }}" required />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input name="email" value="{{ session.user.email }}" />
          </div>

          <div class="form-group">
            <label>Change Profile Image</label>
            <input type="file" name="image" accept="image/*" />
          </div>

          <button id="submit-btn" type="submit" class="btn-primary">
            Update Profile
          </button>
        </form>
      </div>
    </div>

    <!-- SweetAlert2 Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <script>
      {% for category, message in messages %}
        Swal.fire({
          icon: "{{ 'success' if category=='success' else 'error' }}",
          title: "{{ category.title() }}",
          text: "{{ message }}",
          showConfirmButton: false,
          timer: 2000
        });
      {% endfor %}
    </script>
    {% endif %} {% endwith %}
  </body>
</html>
